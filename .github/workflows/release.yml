name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tuhucar-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tuhucar-darwin-x64
          # Linux GNU
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tuhucar-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tuhucar-linux-arm64
            cross: true
          # Linux musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: tuhucar-linux-x64-musl
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: tuhucar-linux-arm64-musl
            cross: true
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tuhucar-win32-x64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: tuhucar-win32-arm64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p tuhucar-cli
          else
            cargo build --release --target ${{ matrix.target }} -p tuhucar-cli
          fi
        shell: bash

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/tuhucar.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/tuhucar ${{ matrix.artifact }}
          fi
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256 || shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*

  npm-publish:
    name: Publish npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
